<link rel="stylesheet" href="calculadora.css">

</head>

<body>

<!-- SECCIÓN CALCULADORA -->
<section class="calc-section">

    <h1 class="calc-title">Calculadora</h1>
    <p class="calc-sub">Simple. Rápida. Inteligente.</p>

    <!-- CALCULADORA -->
    <div class="calc-wrapper">
        <div id="calculadora">
            <input type="text" id="display" disabled>

            <div class="buttons">
                <!-- LIMPIAR -->
                <button onclick="clearDisplay()" id="clear" style="background-color: #83AD7F;">CA</button>
                <button onclick="append('/')" style="background-color: #BAD1B7;">/</button>
                <button onclick="append('*')" style="background-color: #BAD1B7;">×</button>
                <button onclick="append('-')" style="background-color: #BAD1B7;">-</button>

                <!-- NÚMEROS -->
                    <button onclick="append('7')">7</button>
                    <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button onclick="append('+')" style="background-color: #BAD1B7;">+</button>

                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button onclick="calculate()" id="igual" style="background-color: #BAD1B7;">=</button>

                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button onclick="append('0')">0</button>

                <!-- CIENTÍFICOS -->
                <button onclick="append('Math.sqrt(')">√</button>
                <button onclick="append('Math.sin(')">sin</button>
                <button onclick="append('Math.cos(')">cos</button>
                <button onclick="append('Math.tan(')">tan</button>

                <button onclick="append('**2')">x²</button>
                <button onclick="append('**3')">x³</button>
                <button onclick="append('(')" style="background-color: #BAD1B7;">(</button>
                <button onclick="append(')')" style="background-color: #BAD1B7;">)</button>

            </div>
        </div>
    </div>
    <div class="history">
        <h3>Historial</h3>
        <ul id="historyList"></ul>
    </div>
    <!-- INFO -->
    <div class="calc-info">
        <h3>¿Qué puedes hacer?</h3>
        <p>Realiza operaciones básicas, cálculos rápidos y mejora tu productividad diaria.</p>
    </div>

</section>

<script src="calculadora.js"></script>

</body>
</html>
